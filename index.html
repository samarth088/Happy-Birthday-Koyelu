/* LOGIN SCREEN */
.login{

  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  background:white;
}

.login h1{
  color:#e91e63;

}

input{
  padding:10px;
  border-radius:8px;
  border:1px solid #ccc;
}

button{
  padding:10px 20px;
  margin-top:15px;
  border:none;
  border-radius:10px;
  background:#e91e63;
  color:white;
  cursor:pointer;
}

/* HEARTS */
.heart{
  position:absolute;
  color:#ff4d6d;
  animation:float 6s linear infinite;
}
@keyframes float{
  0%{transform:translateY(0);opacity:1;}
  100%{transform:translateY(-800px);opacity:0;}
}

/* BOOK */
.book-container{
  display:none;
  height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  perspective:2000px;
}

.book{
  width:800px;
  height:550px;
  position:relative;
}

.page{
  width:100%;
  height:100%;
  position:absolute;
  background:white;
  border-radius:15px;
  padding:40px;
  box-shadow:0 15px 40px rgba(0,0,0,0.3);
  transform-origin:left;
  transition:transform 1s;
  backface-visibility:hidden;
  overflow-y:auto;
}

.page.flipped{
  transform:rotateY(-180deg);
}

.glow{
  text-align:center;
  color:#e91e63;
  text-shadow:0 0 10px #ff80ab,0 0 20px #ff4081;
}

.controls{
  position:fixed;
  bottom:20px;
  left:50%;
  transform:translateX(-50%);
}
</style>

<body>

<div class="login" id="loginBox">

<div class="book-container" id="bookContainer">

<div class="controls">

<script>

// COUNTDOWN
let time=10;
let cd=setInterval(()=>{
  document.getElementById("countdown").innerText="Opening in "+time+"...";
  time--;
  if(time<0) clearInterval(cd);
},1000);

// HEARTS
setInterval(()=>{
  let heart=document.createElement("div");
  heart.className="heart";
  heart.innerHTML="❤";
  heart.style.left=Math.random()*100+"vw";
  heart.style.fontSize=(20+Math.random()*30)+"px";
  document.body.appendChild(heart);
  setTimeout(()=>heart.remove(),6000);
},500);

// PASSWORD
function unlock(){
  if(document.getElementById("pass").value==="koyel520flowers"){
    document.getElementById("loginBox").style.display="none";
    document.getElementById("bookContainer").style.display="flex";
    document.getElementById("bgMusic").play();
  }else{
    alert("Wrong Code 😏");
  }
}

const book=document.getElementById("book");

pagesContent.forEach((content,i)=>{
  let page=document.createElement("div");
  page.className="page";
  page.style.zIndex=pagesContent.length-i;
  page.innerHTML=content;
  book.appendChild(page);
});

let currentPage=0;

function nextPage(){
  if(currentPage<pagesContent.length){
    book.children[currentPage].classList.add("flipped");
    currentPage++;
  }
}

function prevPage(){
  if(currentPage>0){
    currentPage--;
    book.children[currentPage].classList.remove("flipped");
  }
}
