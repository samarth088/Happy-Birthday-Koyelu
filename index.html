<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>For Koyel ❤️</title>

<link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@700&display=swap" rel="stylesheet">

<style>
body{
  margin:0;
  background:linear-gradient(135deg,#ffdde1,#ee9ca7);
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
  font-family:'Dancing Script',cursive;
  overflow:hidden;
}

/* Floating Hearts */
.heart{
  position:absolute;
  color:#ff4d6d;
  animation:float 6s linear infinite;
}
@keyframes float{
  0%{transform:translateY(0) scale(1);opacity:1;}
  100%{transform:translateY(-800px) scale(1.5);opacity:0;}
}

/* Book Container */
.book{
  width:700px;
  height:500px;
  perspective:2000px;
  display:none;
}

.page{
  width:100%;
  height:100%;
  background:white;
  position:absolute;
  border-radius:15px;
  box-shadow:0 15px 40px rgba(0,0,0,0.3);
  transform-origin:left;
  transition:transform 1s;
  padding:40px;
  box-sizing:border-box;
}

.page.flipped{
  transform:rotateY(-180deg);
}

h1{
  text-align:center;
  color:#e91e63;
  text-shadow:0 0 10px #ff80ab;
}

.glow{
  color:#e91e63;
  text-shadow:0 0 5px #ff80ab,0 0 20px #ff4081,0 0 30px #ff1744;
}

.controls{
  position:absolute;
  bottom:20px;
  left:50%;
  transform:translateX(-50%);
}

button{
  padding:10px 20px;
  margin:10px;
  border:none;
  border-radius:10px;
  background:#e91e63;
  color:white;
  cursor:pointer;
}

/* Login */
.login{
  background:white;
  padding:40px;
  border-radius:20px;
  box-shadow:0 10px 30px rgba(0,0,0,0.3);
  text-align:center;
}

input{
  padding:10px;
  border-radius:8px;
  border:1px solid #ccc;
}
</style>
</head>
<body>

<div class="login" id="loginBox">
<h1>Countdown to Something Special 💌</h1>
<p id="countdown"></p>
<input type="password" id="pass" placeholder="Enter Secret">
<br><br>
<button onclick="unlock()">Unlock</button>
</div>

<div class="book" id="book"></div>

<audio id="bgMusic" loop>
<source src="https://www.bensound.com/bensound-music/bensound-romantic.mp3">
</audio>

<script>
/* Countdown 10 sec */
let time=10;
let cd=setInterval(()=>{
  document.getElementById("countdown").innerText="Opening in "+time+" seconds...";
  time--;
  if(time<0) clearInterval(cd);
},1000);

/* Floating Hearts */
setInterval(()=>{
  let heart=document.createElement("div");
  heart.className="heart";
  heart.innerHTML="❤";
  heart.style.left=Math.random()*100+"vw";
  heart.style.fontSize=(20+Math.random()*30)+"px";
  document.body.appendChild(heart);
  setTimeout(()=>heart.remove(),6000);
},500);

/* Pages */
const book=document.getElementById("book");

for(let i=1;i<=100;i++){
  let page=document.createElement("div");
  page.className="page";
  page.style.zIndex=100-i;

  if(i===100){
    page.innerHTML="<h1 class='glow'>Koyel ❤️</h1><p>Page 100 💍<br><br>I don't just love you...<br>I choose you.<br><br>Will you stay with me and write the next 1000 pages together?</p>";
  }else{
    page.innerHTML="<h1 class='glow'>Koyel ❤️</h1><p>Page "+i+" 💖<br><br>Every page of this book carries a piece of my heart.<br>You make ordinary days feel magical.<br>This is page "+i+" written only for you.</p>";
  }

  book.appendChild(page);
}

let currentPage=0;

function unlock(){
  if(document.getElementById("pass").value==="tultuli"){
    document.getElementById("loginBox").style.display="none";
    book.style.display="block";
    document.getElementById("bgMusic").play();
  }else{
    alert("Wrong Code 😏");
  }
}

function nextPage(){
  if(currentPage<100){
    book.children[currentPage].classList.add("flipped");
    currentPage++;
  }
}

function prevPage(){
  if(currentPage>0){
    currentPage--;
    book.children[currentPage].classList.remove("flipped");
  }
}

/* Controls */
let controls=document.createElement("div");
controls.className="controls";
controls.innerHTML="<button onclick='prevPage()'>⬅ Prev</button><button onclick='nextPage()'>Next ➡</button>";
book.appendChild(controls);
</script>

</body>
</html>
