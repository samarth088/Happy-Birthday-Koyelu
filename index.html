<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Happy Birthday Madam ❤️</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    body {
      margin: 0;
      font-family: 'Georgia', serif;
      background: linear-gradient(to right, #ffdde1, #ee9ca7);
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      text-align: center;
    }

    .container {
      background: white;
      padding: 40px;
      border-radius: 20px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.2);
      max-width: 600px;
    }

    h1 {
      color: #e91e63;
    }

    .hidden {
      display: none;
    }

    button {
      padding: 10px 20px;
      background: #e91e63;
      border: none;
      color: white;
      border-radius: 10px;
      cursor: pointer;
      font-size: 16px;
    }

    input {
      padding: 8px;
      margin: 10px;
      border-radius: 8px;
      border: 1px solid #ccc;
    }
  </style>
</head>
<body>

<div class="container" id="loginBox">
  <h1>Enter Secret Code 💌</h1>
  <input type="password" id="password" placeholder="Enter Code">
  <br>
  <button onclick="checkPassword()">Open</button>
</div>

<div class="container hidden" id="book">
  <h1>Happy Birthday Koyel ❤️</h1>
  <p>
    This is not just a website.<br>
    This is 100 pages of my heart written only for you.
  </p>
  <hr>
  <p>
    Page 1:<br><br>
    The day you came into my life,
    everything started feeling different...
  </p>
</div>

<script>
  function checkPassword() {
    var password = document.getElementById("password").value;
    if(password === "koyel520flowers") {
      document.getElementById("loginBox").style.display = "none";
      document.getElementById("book").classList.remove("hidden");
    } else {
      alert("Wrong code 😏");
    }
  }
</script>

</body>
</html>
