<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>For Koyel ❤️</title>

<link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@700&display=swap" rel="stylesheet">

<style>
body{
  margin:0;
  background:linear-gradient(135deg,#ffdde1,#ee9ca7);
  font-family:'Dancing Script',cursive;
  overflow:hidden;
}

/* LOGIN SCREEN */
.login{
  height:100vh;
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  background:white;
}

.login h1{
  color:#e91e63;
  text-shadow:0 0 10px #ff80ab;
}

input{
  padding:10px;
  border-radius:8px;
  border:1px solid #ccc;
}

button{
  padding:10px 20px;
  margin-top:15px;
  border:none;
  border-radius:10px;
  background:#e91e63;
  color:white;
  cursor:pointer;
}

/* HEARTS */
.heart{
  position:absolute;
  color:#ff4d6d;
  animation:float 6s linear infinite;
}
@keyframes float{
  0%{transform:translateY(0);opacity:1;}
  100%{transform:translateY(-800px);opacity:0;}
}

/* BOOK */
.book-container{
  display:none;
  height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  perspective:2000px;
}

.book{
  width:800px;
  height:550px;
  position:relative;
}

.page{
  width:100%;
  height:100%;
  position:absolute;
  background:white;
  border-radius:15px;
  padding:40px;
  box-shadow:0 15px 40px rgba(0,0,0,0.3);
  transform-origin:left;
  transition:transform 1s;
  backface-visibility:hidden;
  overflow-y:auto;
}

.page.flipped{
  transform:rotateY(-180deg);
}

.glow{
  text-align:center;
  color:#e91e63;
  text-shadow:0 0 10px #ff80ab,0 0 20px #ff4081;
}

.controls{
  position:fixed;
  bottom:20px;
  left:50%;
  transform:translateX(-50%);
}
</style>
</head>
<body>

<div class="login" id="loginBox">
  <h1 id="countdown">Opening in 10...</h1>
  <input type="password" id="pass" placeholder="Enter Secret">
  <button onclick="unlock()">Unlock</button>
</div>

<div class="book-container" id="bookContainer">
  <div class="book" id="book"></div>
</div>

<audio id="bgMusic" loop>
  <source src="https://www.bensound.com/bensound-music/bensound-romantic.mp3">
</audio>

<div class="controls">
  <button onclick="prevPage()">⬅ Prev</button>
  <button onclick="nextPage()">Next ➡</button>
</div>

<script>

// COUNTDOWN
let time=10;
let cd=setInterval(()=>{
  document.getElementById("countdown").innerText="Opening in "+time+"...";
  time--;
  if(time<0) clearInterval(cd);
},1000);

// HEARTS
setInterval(()=>{
  let heart=document.createElement("div");
  heart.className="heart";
  heart.innerHTML="❤";
  heart.style.left=Math.random()*100+"vw";
  heart.style.fontSize=(20+Math.random()*30)+"px";
  document.body.appendChild(heart);
  setTimeout(()=>heart.remove(),6000);
},500);

// PASSWORD
function unlock(){
  if(document.getElementById("pass").value==="tultuli"){
    document.getElementById("loginBox").style.display="none";
    document.getElementById("bookContainer").style.display="flex";
    document.getElementById("bgMusic").play();
  }else{
    alert("Wrong Code 😏");
  }
}

// ===== ADD YOUR 50 PAGES HERE =====

const pagesContent = [
`<h2 class="glow">Page 1</h2><p>PASTE PAGE 1 CONTENT</p>`,
`<h2 class="glow">Page 2</h2><p>PASTE PAGE 2 CONTENT</p>`,
// Continue till Page 50
`<h2 class="glow">Page 50</h2><p>PASTE PROPOSAL CONTENT</p>`
];

// ===================================

const book=document.getElementById("book");

pagesContent.forEach((content,i)=>{
  let page=document.createElement("div");
  page.className="page";
  page.style.zIndex=pagesContent.length-i;
  page.innerHTML=content;
  book.appendChild(page);
});

let currentPage=0;

function nextPage(){
  if(currentPage<pagesContent.length){
    book.children[currentPage].classList.add("flipped");
    currentPage++;
  }
}

function prevPage(){
  if(currentPage>0){
    currentPage--;
    book.children[currentPage].classList.remove("flipped");
  }
}

</script>

</body>
</html>
